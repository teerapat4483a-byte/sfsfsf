<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เทรดหุ้นจำลอง</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f3f4f6;color:#1e293b;min-height:100vh;padding:1rem}
.wrap{max-width:820px;margin:0 auto}

/* Login Screen */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:90vh}
.login-card{background:#fff;border-radius:12px;padding:2rem;width:100%;max-width:380px;box-shadow:0 2px 12px rgba(0,0,0,.08);border:1px solid #e5e7eb}
.logo{text-align:center;margin-bottom:1.5rem}
.logo-icon{font-size:40px}
.logo h1{font-size:20px;font-weight:700;margin-top:.5rem}
.logo p{font-size:13px;color:#64748b;margin-top:4px}
.tabs{display:flex;background:#f1f5f9;border-radius:8px;padding:4px;margin-bottom:1.25rem;gap:4px}
.tab-btn{flex:1;padding:7px;border:none;background:transparent;border-radius:6px;font-size:13px;cursor:pointer;color:#64748b;font-weight:500}
.tab-btn.active{background:#fff;color:#1e293b;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.panel{display:none}.panel.active{display:block}
.field{margin-bottom:.875rem}
label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px}
input{width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none}
input:focus{border-color:#2563eb}
.btn-login{width:100%;padding:10px;border:none;border-radius:8px;background:#2563eb;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:.5rem}
.btn-login:hover{background:#1d4ed8}
.msg{font-size:12px;margin-top:.5rem;padding:7px 10px;border-radius:6px;display:none}
.msg.err{background:#fee2e2;color:#dc2626;display:block}
.msg.ok{background:#dcfce7;color:#16a34a;display:block}
.admin-link{text-align:center;margin-top:1rem;font-size:12px;color:#94a3b8}
.admin-link a{color:#2563eb;text-decoration:none}

/* Main App */
.main-app{display:none}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:8px;background:#fff;padding:.875rem 1rem;border-radius:10px;border:1px solid #e5e7eb}
.title{font-size:17px;font-weight:700}
.user-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.username-badge{font-size:12px;font-weight:700;background:#e8f0fe;color:#2563eb;padding:3px 10px;border-radius:99px}
.cash-badge{font-size:13px;color:#16a34a;font-weight:700}
.topup-row{display:flex;gap:5px}
.topup-row input{width:95px;padding:5px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;outline:none}
.btn-topup{background:#e8f0fe;color:#2563eb;border:1px solid #93c5fd;border-radius:6px;padding:5px 9px;font-size:12px;cursor:pointer;font-weight:600}
.btn-logout{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;border-radius:6px;padding:5px 9px;font-size:12px;cursor:pointer}

.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.card{background:#fff;border-radius:8px;padding:.875rem 1rem;border:1px solid #e5e7eb}
.card-label{font-size:11px;color:#64748b;margin-bottom:4px}
.card-val{font-size:19px;font-weight:700}
.up{color:#16a34a}.dn{color:#dc2626}

.tabs2{display:flex;gap:8px;margin-bottom:1rem}
.tab2{padding:6px 16px;border-radius:6px;border:1px solid #d1d5db;font-size:13px;cursor:pointer;background:#fff;color:#64748b}
.tab2.active{background:#e8f0fe;color:#2563eb;border-color:#93c5fd;font-weight:700}
.tab-panel{display:none}.tab-panel.active{display:block}

.stocks{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem}
.stock-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:.875rem 1rem}
.stock-head{display:flex;justify-content:space-between;margin-bottom:.5rem}
.stock-name{font-size:14px;font-weight:700}
.stock-sub{font-size:11px;color:#94a3b8}
.stock-price{font-size:17px;font-weight:700;text-align:right}
.stock-chg{font-size:11px;text-align:right}
.spark{width:100%;height:38px;margin-bottom:.5rem}
.trade-row{display:flex;gap:5px;align-items:center}
.qty{width:55px;padding:4px 7px;border:1px solid #d1d5db;border-radius:6px;font-size:12px}
.btn-buy{background:#dcfce7;color:#16a34a;border:1px solid #86efac;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;font-weight:600}
.btn-sell{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;font-weight:600}

.fast-box{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:1.25rem;margin-bottom:1rem}
.fast-title{font-size:14px;font-weight:700;margin-bottom:1rem}
.fast-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.field-label{font-size:12px;color:#64748b;margin-bottom:4px}
select{width:100%;padding:7px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;outline:none}
.timer-wrap{display:none;margin-bottom:1rem}
.timer-bar-bg{background:#e5e7eb;border-radius:99px;height:10px;overflow:hidden;margin-bottom:5px}
.timer-bar{height:10px;border-radius:99px;background:#2563eb;transition:width .1s linear;width:100%}
.timer-text{font-size:13px;color:#64748b;text-align:center}
.btn-start{width:100%;padding:11px;border-radius:8px;border:1px solid #2563eb;background:#e8f0fe;color:#2563eb;font-size:14px;font-weight:700;cursor:pointer}
.btn-start:disabled{opacity:.4;cursor:not-allowed}

.result-popup{display:none;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:1.5rem;text-align:center;margin-bottom:1rem}
.result-popup.show{display:block}
.r-title{font-size:26px;font-weight:700;margin-bottom:4px}
.r-sub{font-size:13px;color:#64748b}

.section{background:#fff;border-radius:10px;padding:1rem;margin-bottom:1rem;border:1px solid #e5e7eb}
.section-title{font-size:13px;font-weight:700;margin-bottom:.75rem}
.empty{font-size:13px;color:#94a3b8;text-align:center;padding:.5rem}
.port-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
.port-row:last-child{border-bottom:none}
.log-item{font-size:12px;color:#64748b;padding:4px 0;border-bottom:1px solid #f8fafc}
.log-item:last-child{border-bottom:none}

.toast{position:fixed;top:14px;right:14px;background:#fff;border:1px solid #d1d5db;border-radius:8px;padding:.6rem 1rem;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.toast.show{opacity:1}

@media(max-width:520px){
  .cards{grid-template-columns:repeat(2,1fr)}
  .stocks{grid-template-columns:1fr}
  .fast-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<script>
const SUPABASE_URL = 'https://myjawbecdfwwndyrjttx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15amF3YmVjZGZ3d25keXJqdHR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0OTMxNzksImV4cCI6MjA5OTA2OTE3OX0.CdysmTFeVMErbKd4OqCRoFLdRKenqfvKkoXw4ISIoOs';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const STOCKS = [
  {sym:'PTT',name:'PTT',price:35,color:'#2563eb'},
  {sym:'CPALL',name:'CP ALL',price:58,color:'#16a34a'},
  {sym:'AOT',name:'AOT',price:72,color:'#ea580c'},
  {sym:'KBANK',name:'กสิกรไทย',price:145,color:'#9333ea'},
];

let currentUser = null;
let cash = 0;
let portfolio = {};
let prices = {}, histories = {};
let isRunning = false;
let liveChartData = [];
let liveChartInterval = null;
let liveStartPrice = 0;
let liveDirection = 'up';

function fmt(n){return '฿'+Math.round(n).toLocaleString();}
function fmtDec(n){return '฿'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function showMsg(id,msg,isErr){
  const el=document.getElementById(id);
  el.textContent=msg;
  el.className='msg '+(isErr?'err':'ok');
}

function switchAuthTab(tab,el){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('auth-'+tab).classList.add('active');
}

function switchTab(tab,el){
  document.querySelectorAll('.tab2').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  if(tab==='fast') loadFastLog();
}

// ============================================================
// AUTH
// ============================================================
async function doRegister(){
  const username = document.getElementById('r-user').value.trim();
  const password = document.getElementById('r-pass').value.trim();
  if(!username||!password){showMsg('r-msg','กรุณากรอกข้อมูล',true);return;}
  if(username.length<3){showMsg('r-msg','ชื่อผู้ใช้อย่างน้อย 3 ตัวอักษร',true);return;}

  const {data:exist} = await sb.from('users').select('id').eq('username',username).single();
  if(exist){showMsg('r-msg','ชื่อผู้ใช้นี้มีแล้ว',true);return;}

  const {error} = await sb.from('users').insert({username, password, cash:0});
  if(error){showMsg('r-msg','เกิดข้อผิดพลาด: '+error.message,true);return;}
  showRegisterPopup(username);
}

async function doLogin(){
  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value.trim();
  if(!username||!password){showMsg('l-msg','กรุณากรอกข้อมูล',true);return;}

  const {data:user,error} = await sb.from('users').select('*').eq('username',username).eq('password',password).single();
  if(error||!user){showMsg('l-msg','ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง',true);return;}

  currentUser = user;
  cash = user.cash;
  localStorage.setItem('trading_user_id', user.id);
  showMainApp();
}

async function restoreSession(){
  const uid = localStorage.getItem('trading_user_id');
  if(!uid) return;
  const {data:user} = await sb.from('users').select('*').eq('id',uid).single();
  if(user){
    currentUser = user;
    cash = user.cash;
    showMainApp();
  }
}

function showMainApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  document.getElementById('username-badge').textContent = currentUser.username;
  document.getElementById('cash-badge').textContent = fmt(cash);
  renderStocks();
  updateStats();
}

function doLogout(){
  localStorage.removeItem('trading_user_id');
  currentUser = null; cash = 0; portfolio = {};
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('main-app').style.display='none';
}

// ============================================================
// TOPUP
// ============================================================
async function doTopup(){
  const amount = parseInt(document.getElementById('topup-amt').value);
  if(!amount||amount<=0){showToast('ใส่จำนวนเงิน');return;}
  cash += amount;
  await sb.from('users').update({cash}).eq('id',currentUser.id);
  document.getElementById('topup-amt').value='';
  updateStats();
  showToast(`เติม ${fmt(amount)} สำเร็จ`);
}

// ============================================================
// STATS & PORTFOLIO
// ============================================================
function updateStats(){
  let portVal=0, costBasis=0;
  Object.entries(portfolio).forEach(([sym,h])=>{
    portVal += h.qty * prices[sym];
    costBasis += h.qty * h.avgCost;
  });
  const pnl = portVal - costBasis;
  document.getElementById('cash-badge').textContent = fmt(cash);
  document.getElementById('port-val').textContent = fmt(portVal);
  const pEl = document.getElementById('pnl');
  pEl.textContent = (pnl>=0?'+':'')+fmt(pnl);
  pEl.className = 'card-val '+(pnl>=0?'up':'dn');
  document.getElementById('total').textContent = fmt(cash+portVal);
}

function renderPortfolio(){
  const el = document.getElementById('portfolio-list');
  const entries = Object.entries(portfolio).filter(([,h])=>h.qty>0);
  if(!entries.length){el.innerHTML='<div class="empty">ยังไม่มีหุ้น</div>';return;}
  el.innerHTML = entries.map(([sym,h])=>{
    const val = h.qty*prices[sym];
    const pnl = val - h.qty*h.avgCost;
    const pct = (pnl/(h.qty*h.avgCost)*100).toFixed(1);
    return `<div class="port-row">
      <div><strong>${sym}</strong> <span style="color:#94a3b8">${h.qty} หุ้น @ ${fmtDec(h.avgCost)}</span></div>
      <div style="text-align:right">
        <div style="font-weight:700">${fmt(val)}</div>
        <div class="${pnl>=0?'up':'dn'}" style="font-size:11px">${pnl>=0?'+':''}${fmt(pnl)} (${pnl>=0?'+':''}${pct}%)</div>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// STOCKS
// ============================================================
function drawSpark(canvas,data,color){
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  ctx.beginPath();
  data.forEach((v,i)=>{
    const x=i/(data.length-1)*w;
    const y=h-(v-mn)/rng*(h-4)+2;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
}

function renderStocks(){
  const el=document.getElementById('stocks');
  el.innerHTML='';
  STOCKS.forEach(s=>{
    const hist=histories[s.sym];
    const prev=hist[hist.length-2]||hist[0];
    const cur=prices[s.sym];
    const chg=((cur-prev)/prev*100);
    const div=document.createElement('div');
    div.className='stock-card';
    div.innerHTML=`
      <div class="stock-head">
        <div><div class="stock-name">${s.sym}</div><div class="stock-sub">${s.name}</div></div>
        <div><div class="stock-price">${fmtDec(cur)}</div><div class="stock-chg ${chg>=0?'up':'dn'}">${(chg>=0?'+':'')+chg.toFixed(2)}%</div></div>
      </div>
      <canvas class="spark" id="spark-${s.sym}" width="300" height="38"></canvas>
      <div class="trade-row">
        <input type="number" class="qty" id="qty-${s.sym}" value="1" min="1">
        <button class="btn-buy" onclick="doBuy('${s.sym}')">ซื้อ</button>
        <button class="btn-sell" onclick="doSell('${s.sym}')">ขาย</button>
      </div>`;
    el.appendChild(div);
    setTimeout(()=>{const c=document.getElementById('spark-'+s.sym);if(c)drawSpark(c,hist,s.color);},0);
  });
}

function doBuy(sym){
  const qty=parseInt(document.getElementById('qty-'+sym).value)||1;
  const price=prices[sym];
  const total=qty*price;
  if(total>cash){showToast('เงินไม่พอ!');return;}
  cash-=total;
  if(!portfolio[sym]) portfolio[sym]={qty:0,avgCost:0};
  const h=portfolio[sym];
  h.avgCost=(h.avgCost*h.qty+price*qty)/(h.qty+qty);
  h.qty+=qty;
  sb.from('users').update({cash}).eq('id',currentUser.id);
  updateStats();renderPortfolio();
  showToast(`ซื้อ ${sym} ${qty} หุ้น @ ${fmtDec(price)}`);
}

function doSell(sym){
  const qty=parseInt(document.getElementById('qty-'+sym).value)||1;
  if(!portfolio[sym]||portfolio[sym].qty<qty){showToast('หุ้นไม่พอ!');return;}
  const price=prices[sym];
  cash+=qty*price;
  portfolio[sym].qty-=qty;
  sb.from('users').update({cash}).eq('id',currentUser.id);
  updateStats();renderPortfolio();
  showToast(`ขาย ${sym} ${qty} หุ้น @ ${fmtDec(price)}`);
}

async function getOverride(){
  const {data} = await sb.from('result_overrides').select('result').eq('user_id',currentUser.id).single();
  return data ? data.result : 'auto';
}

function drawLiveChart(forced){
  const canvas = document.getElementById('live-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);
  if(liveChartData.length < 2) return;

  const mn = Math.min(...liveChartData);
  const mx = Math.max(...liveChartData);
  const rng = mx - mn || 1;
  const pad = 12;

  // grid lines
  ctx.strokeStyle = '#e5e7eb';
  ctx.lineWidth = 0.5;
  for(let i=0;i<4;i++){
    const y = pad + (h-pad*2)*i/3;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();
  }

  // gradient fill
  const last = liveChartData[liveChartData.length-1];
  const first = liveChartData[0];
  const isUp = last >= first;
  const grad = ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0, isUp?'rgba(22,163,74,.25)':'rgba(220,38,38,.25)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');

  ctx.beginPath();
  liveChartData.forEach((v,i)=>{
    const x = i/(liveChartData.length-1)*(w-pad*2)+pad;
    const y = h-pad-(v-mn)/rng*(h-pad*2);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  const lastX = (liveChartData.length-1)/(liveChartData.length-1)*(w-pad*2)+pad;
  const lastY = h-pad-(last-mn)/rng*(h-pad*2);
  ctx.lineTo(lastX,h-pad);ctx.lineTo(pad,h-pad);
  ctx.closePath();ctx.fillStyle=grad;ctx.fill();

  // line
  ctx.beginPath();
  liveChartData.forEach((v,i)=>{
    const x = i/(liveChartData.length-1)*(w-pad*2)+pad;
    const y = h-pad-(v-mn)/rng*(h-pad*2);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.strokeStyle = isUp?'#16a34a':'#dc2626';
  ctx.lineWidth = 2;ctx.stroke();

  // dot at end
  ctx.beginPath();
  ctx.arc(lastX,lastY,4,0,Math.PI*2);
  ctx.fillStyle = isUp?'#16a34a':'#dc2626';ctx.fill();

  // update labels
  document.getElementById('chart-price-label').textContent = fmtDec(last);
  const chg = ((last-liveStartPrice)/liveStartPrice*100).toFixed(2);
  const chgEl = document.getElementById('chart-chg-label');
  chgEl.textContent = (chg>=0?'+':'')+chg+'%';
  chgEl.style.color = chg>=0?'#16a34a':'#dc2626';
}

function startLiveChart(sym, direction, forced){
  liveSym = sym;
  liveDirection = direction;
  liveStartPrice = prices[sym];
  liveChartData = [liveStartPrice];

  document.getElementById('chart-sym-label').textContent = sym;
  document.getElementById('chart-dir-label').textContent = `เทรดทิศทาง: ${direction==='up'?'⬆ ขึ้น':'⬇ ลง'}`;
  document.getElementById('live-chart-wrap').style.display = 'block';

  liveChartInterval = setInterval(()=>{
    const last = liveChartData[liveChartData.length-1];
    let bias = 0;
    if(forced==='win') bias = direction==='up' ? 0.008 : -0.008;
    else if(forced==='lose') bias = direction==='up' ? -0.008 : 0.008;
    const chg = (Math.random()-0.5+bias)*last*0.03;
    const next = Math.max(1, +(last+chg).toFixed(2));
    liveChartData.push(next);
    if(liveChartData.length > 60) liveChartData.shift();
    drawLiveChart(forced);
  }, 500);
}

function stopLiveChart(){
  if(liveChartInterval) clearInterval(liveChartInterval);
  liveChartInterval = null;
  document.getElementById('live-chart-wrap').style.display = 'none';
}

async function startFast(){
  if(isRunning) return;
  const bet=parseInt(document.getElementById('f-bet').value)||0;
  const sym=document.getElementById('f-sym').value;
  const direction=document.getElementById('f-dir').value;
  const duration=parseInt(document.getElementById('f-time').value);
  if(bet<=0||bet>cash){showToast('เดิมพันไม่ถูกต้องหรือเงินไม่พอ');return;}

  // ดึง override ก่อนเริ่ม เพื่อใช้ bias กราฟ
  const {data:ov} = await sb.from('result_overrides').select('result').eq('user_id',currentUser.id).single();
  const forced = ov ? ov.result : 'auto';

  isRunning=true;
  cash-=bet;
  updateStats();
  document.getElementById('btn-start').disabled=true;
  document.getElementById('result-popup').classList.remove('show');
  document.getElementById('timer-wrap').style.display='block';

  startLiveChart(sym, direction, forced);

  let remaining=duration;
  const bar=document.getElementById('timer-bar');
  const txt=document.getElementById('timer-text');
  bar.style.width='100%';bar.style.background='#2563eb';
  txt.textContent=`${remaining} วินาที — ${sym} ${direction==='up'?'ขึ้น':'ลง'}`;

  const interval=setInterval(()=>{
    remaining--;
    const pct=Math.max(0,(remaining/duration)*100);
    bar.style.width=pct+'%';
    bar.style.background=pct>50?'#2563eb':pct>20?'#f59e0b':'#dc2626';
    txt.textContent=`เหลือ ${remaining} วินาที`;
    if(remaining<=0){
      clearInterval(interval);
      stopLiveChart();
      resolveFast(sym,direction,bet,duration);
    }
  },1000);
}

async function resolveFast(sym,direction,bet,duration){
  const forced = await getOverride();
  let won;
  if(forced==='win') won=true;
  else if(forced==='lose') won=false;
  else won=Math.random()>0.5;

  const profit = won ? Math.round(bet*0.85) : -bet;
  const payout = won ? bet+Math.round(bet*0.85) : 0;
  cash += payout;

  await sb.from('users').update({cash}).eq('id',currentUser.id);
  await sb.from('fast_trades').insert({
    user_id: currentUser.id,
    symbol: sym,
    direction,
    bet,
    duration,
    result: won?'win':'lose',
    pnl: profit,
    forced
  });

  const popup=document.getElementById('result-popup');
  popup.classList.add('show');
  const rTitle=document.getElementById('r-title');
  const rSub=document.getElementById('r-sub');

  if(won){
    rTitle.textContent=`กำไร +${fmt(Math.round(bet*0.85))}`;
    rTitle.className='r-title up';
    rSub.textContent=`${sym} ${direction==='up'?'ขึ้น':'ลง'} ถูกต้อง | เดิมพัน ${fmt(bet)}`;
  } else {
    rTitle.textContent=`ขาดทุน -${fmt(bet)}`;
    rTitle.className='r-title dn';
    rSub.textContent=`${sym} ${direction==='up'?'ขึ้น':'ลง'} ผิด | เสีย ${fmt(bet)}`;
  }

  updateStats();
  document.getElementById('timer-wrap').style.display='none';
  document.getElementById('btn-start').disabled=false;
  isRunning=false;
  loadFastLog();
}

async function loadFastLog(){
  const {data} = await sb.from('fast_trades')
    .select('*').eq('user_id',currentUser.id)
    .order('created_at',{ascending:false}).limit(15);
  const el=document.getElementById('fast-log');
  if(!data||!data.length){el.innerHTML='<div class="empty">ยังไม่มีรายการ</div>';return;}
  el.innerHTML=data.map(l=>{
    const pnlStr=l.pnl>=0?`<span class="up">+${fmt(l.pnl)}</span>`:`<span class="dn">${fmt(l.pnl)}</span>`;
    return`<div class="log-item">${l.symbol} ${l.direction==='up'?'ขึ้น':'ลง'} ${l.duration}วิ | เดิมพัน ${fmt(l.bet)} | ${pnlStr}</div>`;
  }).join('');
}

function tick(){
  STOCKS.forEach(s=>{
    const chg=(Math.random()-.48)*s.price*.025;
    prices[s.sym]=Math.max(1,+(prices[s.sym]+chg).toFixed(2));
    histories[s.sym].push(prices[s.sym]);
    if(histories[s.sym].length>30) histories[s.sym].shift();
  });
  if(document.getElementById('panel-normal').classList.contains('active')){
    renderStocks();renderPortfolio();
  }
  updateStats();
}

function showRegisterPopup(username){
  document.getElementById('reg-popup-name').textContent = `ยินดีต้อนรับ ${username} กรุณาเข้าสู่ระบบเพื่อเริ่มเทรด`;
  const overlay = document.getElementById('reg-popup-overlay');
  overlay.style.display = 'flex';
}

function closeRegisterPopup(){
  document.getElementById('reg-popup-overlay').style.display = 'none';
  switchAuthTab('login', document.querySelector('.tab-btn'));
}

restoreSession();
setInterval(tick,3000);
