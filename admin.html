<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — เทรดจำลอง</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f3f4f6;color:#1e293b;min-height:100vh;padding:1rem}
.wrap{max-width:900px;margin:0 auto}

.login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:99}
.login-card{background:#fff;border-radius:12px;padding:2rem;width:320px;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.login-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:1.25rem}
.field{margin-bottom:.875rem}
label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px}
input{width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none}
input:focus{border-color:#2563eb}
.btn-login{width:100%;padding:10px;border:none;border-radius:8px;background:#2563eb;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:.5rem}
.err{color:#dc2626;font-size:12px;margin-top:.5rem;text-align:center}

.main-content{display:none}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;background:#fff;padding:.875rem 1rem;border-radius:10px;border:1px solid #e5e7eb;flex-wrap:wrap;gap:8px}
.title{font-size:17px;font-weight:700}
.badge-admin{background:#fef3c7;color:#d97706;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700;margin-left:8px}
.topbar-right{display:flex;gap:8px;align-items:center}
.btn-refresh{background:#f1f5f9;color:#475569;border:1px solid #d1d5db;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer}
.btn-logout{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.stat-card{background:#fff;border-radius:8px;padding:.875rem 1rem;border:1px solid #e5e7eb;text-align:center}
.stat-label{font-size:12px;color:#64748b;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:700}
.up{color:#16a34a}.dn{color:#dc2626}

.section{background:#fff;border-radius:10px;padding:1rem;margin-bottom:1rem;border:1px solid #e5e7eb}
.section-title{font-size:14px;font-weight:700;margin-bottom:1rem}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;background:#f8fafc;color:#64748b;font-weight:700;border-bottom:1px solid #e5e7eb;font-size:12px}
td{padding:10px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}

.result-btns{display:flex;gap:5px}
.rb{padding:4px 10px;border-radius:6px;border:1px solid #d1d5db;font-size:11px;cursor:pointer;font-weight:700;background:#f9fafb;color:#64748b;transition:opacity .2s}
.rb:hover{opacity:.8}
.rb.auto.on{background:#e8f0fe;color:#2563eb;border-color:#93c5fd}
.rb.win.on{background:#dcfce7;color:#16a34a;border-color:#86efac}
.rb.lose.on{background:#fee2e2;color:#dc2626;border-color:#fca5a5}
.rb.pct.on{background:#fef3c7;color:#d97706;border-color:#fcd34d}
.pct-row{display:flex;gap:5px;align-items:center;margin-top:6px}
.pct-row input{width:70px;padding:4px 7px;font-size:12px;border:1px solid #d1d5db;border-radius:6px;text-align:center}
.btn-pct{background:#fef3c7;color:#d97706;border:1px solid #fcd34d;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:700}

.adj-row{display:flex;gap:5px;align-items:center}
.adj-row input{width:85px;padding:4px 7px;font-size:12px;border:1px solid #d1d5db;border-radius:6px}
.btn-add{background:#dcfce7;color:#16a34a;border:1px solid #86efac;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;font-weight:700}
.btn-cut{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;font-weight:700}

.empty{text-align:center;color:#94a3b8;padding:2rem;font-size:13px}
.toast{position:fixed;top:14px;right:14px;background:#fff;border:1px solid #d1d5db;border-radius:8px;padding:.6rem 1rem;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- Login -->
<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <div class="login-title">🔐 Admin Login</div>
    <div class="field"><label>Username</label><input type="text" id="a-user" value="admin" placeholder="admin"></div>
    <div class="field"><label>Password</label><input type="password" id="a-pass" placeholder="รหัสผ่าน" onkeydown="if(event.key==='Enter')doAdminLogin()"></div>
    <div class="err" id="a-err"></div>
    <button class="btn-login" onclick="doAdminLogin()">เข้าสู่ระบบ</button>
  </div>
</div>

<!-- Main -->
<div class="main-content" id="main-content">
<div class="wrap">
  <div class="topbar">
    <div>
      <span class="title">⚙️ Admin Panel</span>
      <span class="badge-admin">ADMIN</span>
    </div>
    <div class="topbar-right">
      <button class="btn-refresh" onclick="loadUsers()">รีเฟรช</button>
      <button class="btn-logout" onclick="doLogout()">ออกจากระบบ</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">ผู้เล่นทั้งหมด</div><div class="stat-val" id="stat-total">0</div></div>
    <div class="stat-card"><div class="stat-label">บังคับกำไร</div><div class="stat-val up" id="stat-win">0</div></div>
    <div class="stat-card"><div class="stat-label">บังคับขาดทุน</div><div class="stat-val dn" id="stat-lose">0</div></div>
  </div>

  <!-- CHAT SECTION -->
  <div class="section">
    <div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>💬 ข้อความจากผู้เล่น</span>
      <span id="chat-unread-badge" style="display:none;background:#ef4444;color:#fff;border-radius:99px;padding:2px 8px;font-size:11px;font-weight:700"></span>
      <button onclick="loadChatRooms()" style="background:#e8f0fe;color:#2563eb;border:1px solid #93c5fd;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer">รีเฟรช</button>
    </div>
    <div class="chat-sidebar">
      <div class="chat-rooms-list" id="admin-rooms-list">
        <div style="padding:1rem;text-align:center;color:#94a3b8;font-size:13px">กำลังโหลด...</div>
      </div>
      <div class="chat-main" id="admin-chat-main">
        <div class="no-room-selected">
          <div style="font-size:36px">💬</div>
          <div>เลือกผู้เล่นเพื่อดูข้อความ</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Withdrawal Requests -->
  <div class="section" id="wd-section">
    <div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>💸 คำขอถอนเงิน</span>
      <button onclick="loadWithdrawals()" style="background:#e8f0fe;color:#2563eb;border:1px solid #93c5fd;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer">รีเฟรช</button>
    </div>
    <div id="wd-list"><div class="port-empty">กำลังโหลด...</div></div>
  </div>

  <div class="section">
    <div class="section-title">จัดการผู้เล่น</div>
    <table>
      <thead>
        <tr>
          <th>ผู้ใช้</th>
          <th>เงินสด</th>
          <th>บัญชีธนาคาร</th>
          <th>กำหนดผลเทรดเร็ว</th>
          <th>ปรับเงิน</th>
        </tr>
      </thead>
      <tbody id="users-tbody">
        <tr><td colspan="4" class="empty">กำลังโหลด...</td></tr>
      </tbody>
    </table>
  </div>
</div>
</div>

<!-- Withdraw Requests -->
<div class="main-content" id="withdraw-section" style="display:none;margin-top:1rem">
</div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://myjawbecdfwwndyrjttx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15amF3YmVjZGZ3d25keXJqdHR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0OTMxNzksImV4cCI6MjA5OTA2OTE3OX0.CdysmTFeVMErbKd4OqCRoFLdRKenqfvKkoXw4ISIoOs';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_USER = 'admin';
const ADMIN_PASS = 'admin1234';

let usersData = [];
let isAdmin = false;

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function doAdminLogin(){
  const u=document.getElementById('a-user').value;
  const p=document.getElementById('a-pass').value;
  if(u===ADMIN_USER && p===ADMIN_PASS){
    isAdmin=true;
    sessionStorage.setItem('is_admin','1');
    document.getElementById('login-overlay').style.display='none';
    document.getElementById('main-content').style.display='block';
    loadUsers();loadWithdrawals();loadChatRooms();
  } else {
    document.getElementById('a-err').textContent='รหัสผ่านไม่ถูกต้อง';
  }
}

function doLogout(){
  sessionStorage.removeItem('is_admin');
  isAdmin=false;
  document.getElementById('login-overlay').style.display='flex';
  document.getElementById('main-content').style.display='none';
}

async function loadUsers(){
  const {data:users} = await sb.from('users').select('id,username,cash,created_at').order('created_at');
  const {data:overrides} = await sb.from('result_overrides').select('*');

  usersData = (users||[]).map(u=>{
    const ov = (overrides||[]).find(o=>o.user_id===u.id);
    return {...u, forced_result: ov?ov.result:'auto'};
  });

  document.getElementById('stat-total').textContent = usersData.length;
  document.getElementById('stat-win').textContent = usersData.filter(u=>!isNaN(parseFloat(u.forced_result))?parseFloat(u.forced_result)>0:u.forced_result==='win').length;
  document.getElementById('stat-lose').textContent = usersData.filter(u=>!isNaN(parseFloat(u.forced_result))?parseFloat(u.forced_result)<0:u.forced_result==='lose').length;

  renderUsers();
}

function renderUsers(){
  const tbody = document.getElementById('users-tbody');
  if(!usersData.length){
    tbody.innerHTML='<tr><td colspan="4" class="empty">ยังไม่มีผู้เล่น</td></tr>';
    return;
  }
  tbody.innerHTML = usersData.map(u=>`
    <tr>
      <td><strong>${u.username}</strong><br><span style="font-size:10px;color:#94a3b8">${u.id.slice(0,8)}...</span></td>
      <td><span style="font-weight:700;color:#16a34a">฿${Math.round(u.cash).toLocaleString()}</span></td>
      <td style="font-size:12px">
        ${u.bank_name?`<div style="font-weight:600">${u.bank_name}</div><div style="color:#64748b">${u.bank_number||'-'}</div><div style="color:#64748b">${u.bank_owner||'-'}</div>`:'<span style="color:#94a3b8">-</span>'}
      </td>
      <td>
        <div class="result-btns">
          <button class="rb auto ${u.forced_result==='auto'?'on':''}" onclick="setResult('${u.id}','auto',this)">สุ่ม</button>
          <button class="rb win ${u.forced_result==='win'?'on':''}" onclick="setResult('${u.id}','win',this)">+85%</button>
          <button class="rb lose ${u.forced_result==='lose'?'on':''}" onclick="setResult('${u.id}','lose',this)">-100%</button>
          <button class="rb pct ${!['auto','win','lose'].includes(u.forced_result)?'on':''}" onclick="setPct('${u.id}',this)">กำหนด%</button>
        </div>
        <div class="pct-row">
          <input type="number" id="pct-${u.id}" placeholder="เช่น 50 หรือ -30" value="${!['auto','win','lose'].includes(u.forced_result)?u.forced_result:''}">
          <button class="btn-pct" onclick="applyPct('${u.id}')">ตั้ง</button>
          <span style="font-size:11px;color:#94a3b8" id="pct-label-${u.id}">${!['auto','win','lose'].includes(u.forced_result)?`<span style="color:${parseFloat(u.forced_result)>=0?'#16a34a':'#dc2626'};font-weight:700">${parseFloat(u.forced_result)>=0?'+':''}${u.forced_result}%</span>`:'ยังไม่ตั้ง'}</span>
        </div>
      </td>
      <td>
        <div class="adj-row">
          <input type="number" id="adj-${u.id}" placeholder="จำนวน" min="0" step="1000">
          <button class="btn-add" onclick="adjustCash('${u.id}',1)">+เติม</button>
          <button class="btn-cut" onclick="adjustCash('${u.id}',-1)">-หัก</button>
        </div>
      </td>
    </tr>
  `).join('');
}

async function setResult(userId, result, btn){
  const res=await sb.from('result_overrides').upsert({user_id:userId,result,updated_at:new Date().toISOString()},{onConflict:'user_id'});
  const row=btn.closest('tr');
  row.querySelectorAll('.rb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const u=usersData.find(u=>u.id===userId);
  if(u) u.forced_result=result;
  updateStats();
  const labels={auto:'สุ่ม',win:'+85%',lose:'-100%'};
  showToast(`ตั้งผล "${labels[result]||result}" ให้ ${u?u.username:userId}`);
  // reset pct label
  const lbl=document.getElementById('pct-label-'+userId);
  if(lbl) lbl.innerHTML='ยังไม่ตั้ง';
  const inp=document.getElementById('pct-'+userId);
  if(inp) inp.value='';
}

async function applyPct(userId){
  const inp=document.getElementById('pct-'+userId);
  const val=parseFloat(inp.value);
  if(isNaN(val)||val<-100||val>1000){showToast('ใส่ % ระหว่าง -100 ถึง 1000');return;}
  const result=String(val);
  await sb.from('result_overrides').upsert({user_id:userId,result,updated_at:new Date().toISOString()},{onConflict:'user_id'});
  const u=usersData.find(u=>u.id===userId);
  if(u) u.forced_result=result;
  // update UI
  const row=document.getElementById('pct-'+userId).closest('tr');
  row.querySelectorAll('.rb').forEach(b=>b.classList.remove('on'));
  row.querySelector('.rb.pct').classList.add('on');
  const lbl=document.getElementById('pct-label-'+userId);
  if(lbl) lbl.innerHTML=`<span style="color:${val>=0?'#16a34a':'#dc2626'};font-weight:700">${val>=0?'+':''}${val}%</span>`;
  updateStats();
  showToast(`ตั้ง ${val>=0?'+':''}${val}% ให้ ${u?u.username:userId}`);
}

function setPct(userId,btn){
  btn.closest('tr').querySelectorAll('.rb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('pct-'+userId).focus();
}

async function adjustCash(userId, sign){
  const input = document.getElementById('adj-'+userId);
  const amount = parseFloat(input.value);
  if(!amount||amount<=0){showToast('ใส่จำนวนเงิน');return;}

  const u = usersData.find(u=>u.id===userId);
  if(!u) return;
  const newCash = u.cash + amount*sign;
  if(newCash<0){showToast('เงินติดลบไม่ได้');return;}

  await sb.from('users').update({cash: newCash}).eq('id', userId);
  u.cash = newCash;
  input.value='';
  renderUsers();
  showToast(`${sign>0?'เติม':'หัก'} ฿${amount.toLocaleString()} ให้ ${u.username}`);
}

// Restore session
if(sessionStorage.getItem('is_admin')==='1'){
  isAdmin=true;
  document.getElementById('login-overlay').style.display='none';
  document.getElementById('main-content').style.display='block';
  loadUsers();loadWithdrawals();loadChatRooms();
}

/* ─── ADMIN CHAT ─── */
let activeRoomId=null;
let chatPollAdminIv=null;

async function loadChatRooms(){
  const {data:rooms}=await sb.from('chat_rooms').select('*').order('last_time',{ascending:false,nullsFirst:false});
  const el=document.getElementById('admin-rooms-list');
  if(!rooms||!rooms.length){el.innerHTML='<div style="padding:1rem;text-align:center;color:#94a3b8;font-size:13px">ยังไม่มีข้อความ</div>';return;}
  const unread=rooms.filter(r=>r.unread_admin).length;
  const badge=document.getElementById('chat-unread-badge');
  if(unread>0){badge.style.display='inline';badge.textContent=unread+' ใหม่';}
  else badge.style.display='none';
  el.innerHTML=rooms.map(r=>`
    <div class="chat-room-item ${r.id===activeRoomId?'active':''}" onclick="openAdminRoom('${r.id}','${r.username}')">
      <div class="chat-room-header">
        <div class="chat-room-name">${r.username}${r.unread_admin?'<span class="chat-room-badge">ใหม่</span>':''}</div>
        <div class="chat-room-time">${r.last_time?new Date(r.last_time).toLocaleTimeString('th',{hour:'2-digit',minute:'2-digit'}):''}</div>
      </div>
      <div class="chat-room-preview">${r.last_message||'ยังไม่มีข้อความ'}</div>
    </div>`).join('');
}

async function openAdminRoom(roomId, username){
  activeRoomId=roomId;
  clearInterval(chatPollAdminIv);
  // mark as read
  await sb.from('chat_rooms').update({unread_admin:false}).eq('id',roomId);
  loadChatRooms();
  const main=document.getElementById('admin-chat-main');
  main.innerHTML=`
    <div class="chat-main-header">
      <div style="width:32px;height:32px;border-radius:50%;background:#e8f0fe;color:#2563eb;display:flex;align-items:center;justify-content:center;font-weight:700">${username[0].toUpperCase()}</div>
      <div class="chat-main-name">${username}</div>
    </div>
    <div class="chat-main-body" id="admin-msg-body"></div>
    <div class="chat-main-footer">
      <input class="chat-admin-inp" id="admin-chat-inp" placeholder="พิมพ์ข้อความ..." onkeydown="if(event.key==='Enter')sendAdminMsg()">
      <button class="btn-send-admin" onclick="sendAdminMsg()">ส่ง</button>
    </div>`;
  loadAdminMsgs();
  chatPollAdminIv=setInterval(loadAdminMsgs,3000);
}

async function loadAdminMsgs(){
  if(!activeRoomId) return;
  const {data:msgs}=await sb.from('chat_messages').select('*').eq('room_id',activeRoomId).order('created_at',{ascending:true}).limit(100);
  const el=document.getElementById('admin-msg-body');
  if(!el||!msgs) return;
  function fmtTime(ts){const d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
  el.innerHTML=msgs.map(m=>{
    const isAdmin=m.sender==='admin';
    return`<div class="admin-msg-wrap ${isAdmin?'me':'user'}">
      <div class="admin-msg-bubble">${m.message.replace(/
/g,'<br>')}</div>
      <div class="admin-msg-time">${isAdmin?'Admin':'ผู้เล่น'} • ${fmtTime(m.created_at)}</div>
    </div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}

async function sendAdminMsg(){
  const inp=document.getElementById('admin-chat-inp');
  const msg=inp.value.trim();
  if(!msg||!activeRoomId) return;
  inp.value='';
  await sb.from('chat_messages').insert({room_id:activeRoomId,sender:'admin',message:msg});
  await sb.from('chat_rooms').update({last_message:msg,last_time:new Date().toISOString(),unread_user:true}).eq('id',activeRoomId);
  loadAdminMsgs();loadChatRooms();
}

async function loadWithdrawals(){
  const {data}=await sb.from('withdrawals').select('*').order('created_at',{ascending:false}).limit(50);
  const el=document.getElementById('wd-list');
  if(!data||!data.length){el.innerHTML='<div class="port-empty">ยังไม่มีคำขอถอนเงิน</div>';return;}
  el.innerHTML=`<table style="width:100%;border-collapse:collapse;font-size:13px">
    <tr style="background:#f8fafc"><th style="padding:8px;text-align:left;border-bottom:1px solid #e5e7eb">ผู้ใช้</th><th style="padding:8px;text-align:left;border-bottom:1px solid #e5e7eb">จำนวน</th><th style="padding:8px;text-align:left;border-bottom:1px solid #e5e7eb">บัญชี</th><th style="padding:8px;text-align:left;border-bottom:1px solid #e5e7eb">สถานะ</th><th style="padding:8px;border-bottom:1px solid #e5e7eb">จัดการ</th></tr>
    ${data.map(w=>`<tr style="border-bottom:1px solid #f1f5f9">
      <td style="padding:8px"><strong>${w.username}</strong></td>
      <td style="padding:8px;font-weight:700;color:#16a34a">฿${Math.round(w.amount).toLocaleString()}</td>
      <td style="padding:8px;font-size:12px">${w.bank_name||'-'}<br><span style="color:#64748b">${w.bank_number||'-'}</span><br><span style="color:#64748b">${w.bank_owner||'-'}</span></td>
      <td style="padding:8px"><span style="padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;background:${w.status==='pending'?'#fef3c7':w.status==='approved'?'#dcfce7':'#fee2e2'};color:${w.status==='pending'?'#d97706':w.status==='approved'?'#16a34a':'#dc2626'}">${w.status==='pending'?'รอดำเนินการ':w.status==='approved'?'อนุมัติแล้ว':'ปฏิเสธ'}</span></td>
      <td style="padding:8px;text-align:center">
        ${w.status==='pending'?`<button onclick="approveWd('${w.id}')" style="background:#dcfce7;color:#16a34a;border:1px solid #86efac;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;margin-right:4px">✓ อนุมัติ</button><button onclick="rejectWd('${w.id}')" style="background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer">✗ ปฏิเสธ</button>`:'<span style="color:#94a3b8;font-size:12px">-</span>'}
      </td>
    </tr>`).join('')}
  </table>`;
}

async function approveWd(id){
  await sb.from('withdrawals').update({status:'approved'}).eq('id',id);
  showToast('อนุมัติคำขอถอนแล้ว');loadWithdrawals();
}
async function rejectWd(id){
  await sb.from('withdrawals').update({status:'rejected'}).eq('id',id);
  showToast('ปฏิเสธคำขอถอนแล้ว');loadWithdrawals();
}

setInterval(()=>{if(isAdmin){loadUsers();loadWithdrawals();loadChatRooms();}}, 15000);
</script>
</body>
</html>
